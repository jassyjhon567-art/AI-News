name: Auto News Rewriting & Indexing (Manab Bot)

on:
  schedule:
    - cron: '0 */6 * * *' # প্রতি ৬ ঘণ্টা পর পর স্বয়ংক্রিয়ভাবে চলবে
  workflow_dispatch: # ম্যানুয়ালি যেকোনো সময় চালানোর জন্য

permissions:
  contents: write # গিটহাবে ফাইল পুশ করার অনুমতি

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser google-auth

    - name: Run AI Scraping and Indexing
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GCLOUD_KEY: ${{ secrets.GCLOUD_KEY }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add news.json posts/ images/
        git diff-index --quiet HEAD || git commit -m "Manab AI: Generated New SEO Posts and AI Images"
        git push
